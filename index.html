<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Troubador Icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Troubadour — TTRPG Audio Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Apply saved theme before React loads to prevent flash of default colors
      (function() {
        var t = localStorage.getItem('troubadour-theme') || 'darkfantasy';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
